{% load static %}
<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>{% block title %}Intelligent CRM{% endblock title %}</title>
        <link rel="shortcut icon" href="{% static 'images/favicon.png' %}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
            <div class="container">
                <a class="navbar-brand" href="{% url 'dashboard:home' %}">Intelligent CRM</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div id="mainNav" class="collapse navbar-collapse">
                    <div class="navbar-nav ms-auto">
                        <a class="nav-link" href="{% url 'dashboard:home' %}">Dashboard</a>
                        <a class="nav-link" href="{% url 'dashboard:leads' %}">Leads</a>
                        <a class="nav-link" href="/api/leads/">API</a>
                    </div>
                </div>
            </div>
        </nav>
        <main class="container py-4">
            {% block content %}{% endblock content %}
        </main>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>

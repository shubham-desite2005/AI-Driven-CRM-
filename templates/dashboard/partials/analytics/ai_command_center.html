<section class="sales-card rounded-2xl p-5 xl:col-span-2">
    <div class="flex items-center justify-between">
        <div>
            <h2 class="text-xl font-black text-white">AI Command Center</h2>
            <p class="text-sm text-slate-400">Recommendations, risk signals, and next actions</p>
        </div>
        <div class="sales-pulse"></div>
    </div>
    <div class="mt-5 grid grid-cols-1 lg:grid-cols-2 gap-4">
        {% for recommendation in recommendations %}
            <article class="rounded-2xl border border-white/10 bg-white/[0.03] p-4">
                <div class="flex gap-3">
                    <div class="flex h-9 w-9 flex-none items-center justify-center rounded-xl bg-cyan-300/10 text-cyan-200">
                        <i class="fa-solid fa-brain"></i>
                    </div>
                    <div>
                        <p class="text-sm leading-6 text-slate-200">{{ recommendation }}</p>
                        <p class="mt-2 text-xs font-semibold text-emerald-300">Recommended action ready</p>
                    </div>
                </div>
            </article>
        {% endfor %}
    </div>
    <div class="mt-5 rounded-2xl border border-amber-300/20 bg-amber-300/10 p-4">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
            <div>
                <p class="text-sm font-bold text-amber-100">Client risk indicator</p>
                <p class="mt-1 text-sm text-amber-100/80">Three proposal-stage deals have no activity in 5 days.</p>
            </div>
            <span class="rounded-full bg-amber-300 px-3 py-1 text-xs font-black text-slate-950">Review now</span>
        </div>
    </div>
</section>
